{% extends 'banking/admin_base.html' %}
{% block admin_title %}Create User{% endblock %}
{% block admin_content %}
<div class="fade-in max-w-3xl mx-auto">
  <div class="card-dark p-6">
    <h2 class="text-white font-bold text-xl mb-5">Create New User</h2>
    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <div class="grid md:grid-cols-2 gap-4">
        <div><label class="text-gray-400 text-sm block mb-1">Full Name *</label><input name="full_name" required value="{{ post.full_name|default:'' }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500"></div>
        <div><label class="text-gray-400 text-sm block mb-1">User ID (Login) *</label><input name="user_id" required value="{{ post.user_id|default:'' }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500"></div>
        <div><label class="text-gray-400 text-sm block mb-1">Email *</label><input name="email" type="email" required value="{{ post.email|default:'' }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500"></div>
        <div><label class="text-gray-400 text-sm block mb-1">Password *</label><input name="password" type="password" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500"></div>
        <div><label class="text-gray-400 text-sm block mb-1">Phone</label><input name="phone" value="{{ post.phone|default:'' }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500"></div>
        <div><label class="text-gray-400 text-sm block mb-1">Country *</label>
          <select name="country" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500">
            <option value="">-- Select Country --</option>
            <option>🇺🇸 United States</option><option>🇬🇧 United Kingdom</option><option>🇩🇪 Germany</option><option>🇫🇷 France</option><option>🇳🇬 Nigeria</option><option>🇬🇭 Ghana</option><option>🇿🇦 South Africa</option><option>🇰🇪 Kenya</option><option>🇦🇪 UAE</option><option>🇸🇦 Saudi Arabia</option><option>🇮🇳 India</option><option>🇨🇳 China</option><option>🇨🇦 Canada</option><option>🇦🇺 Australia</option><option>🇧🇷 Brazil</option><option>🇲🇽 Mexico</option><option>🇸🇬 Singapore</option><option>🇯🇵 Japan</option><option>🇮🇹 Italy</option><option>🇪🇸 Spain</option><option>🇷🇺 Russia</option><option>🇵🇰 Pakistan</option><option>🇧🇩 Bangladesh</option><option>🇵🇭 Philippines</option><option>🇮🇩 Indonesia</option><option>🇲🇾 Malaysia</option><option>🇹🇷 Turkey</option><option>🇪🇬 Egypt</option><option>🇺🇦 Ukraine</option><option>🇵🇱 Poland</option><option>🇳🇱 Netherlands</option><option>🇧🇪 Belgium</option><option>🇸🇪 Sweden</option><option>🇨🇭 Switzerland</option><option>🇳🇴 Norway</option><option>🇩🇰 Denmark</option><option>🇫🇮 Finland</option><option>🇦🇹 Austria</option><option>🇵🇹 Portugal</option><option>🇬🇷 Greece</option><option>Other</option>
          </select>
        </div>
        <div><label class="text-gray-400 text-sm block mb-1">Occupation</label><input name="occupation" value="{{ post.occupation|default:'' }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500"></div>
        <div><label class="text-gray-400 text-sm block mb-1">Postal Code</label><input name="postal_code" value="{{ post.postal_code|default:'' }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500"></div>
        <div><label class="text-gray-400 text-sm block mb-1">Currency</label>
          <select name="currency" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500">
            <option value="USD">$ USD</option><option value="EUR">€ EUR</option><option value="GBP">£ GBP</option>
          </select>
        </div>
        <div><label class="text-gray-400 text-sm block mb-1">Account Type</label>
          <select name="account_type" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500">
            <option value="checking">Checking</option><option value="savings">Savings</option>
          </select>
        </div>
        <div><label class="text-gray-400 text-sm block mb-1">Initial Balance</label><input name="balance" type="number" step="0.01" value="0" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500"></div>
        <div class="md:col-span-2"><label class="text-gray-400 text-sm block mb-1">Address</label><textarea name="address" rows="2" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500 resize-none">{{ post.address|default:'' }}</textarea></div>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="btn-primary py-2.5 px-6 rounded-lg text-sm font-bold"><i class="fas fa-user-plus mr-2"></i>Create User</button>
        <a href="/admin_dashboard/users/" class="bg-gray-700 text-white py-2.5 px-6 rounded-lg text-sm font-semibold hover:bg-gray-600 transition">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
